<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтвердите email</title>
    <link rel="stylesheet" href="/static/css/style.css?v=2">
</head>
<body>
    <div class="container" style="max-width: 520px;">
        <h1>Проверьте почту</h1>
        <p>Мы отправили письмо с ссылкой для подтверждения на адрес:</p>
        <p><strong>{{ email }}</strong></p>
        <p>Откройте письмо и нажмите «Подтвердить email». Ссылка действует 24 часа.</p>
        <p style="color:#666;font-size:14px;">Если письма нет, проверьте папку «Спам».</p>
        <div class="links" style="margin-top:24px;">
            <p><a href="/login/?email={{ email }}">Перейти ко входу</a></p>
            <p><a href="/">На главную</a></p>
        </div>
        {% include 'footer.html' %}
    </div>
</body>
</html>
