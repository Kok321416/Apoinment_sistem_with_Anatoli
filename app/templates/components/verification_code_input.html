{% macro verification_code_input(field_id, field_name='code', label='Код из письма', hint='') %}
<div class="form-field">
    <span class="form-field__label" id="{{ field_id }}_label">{{ label }}</span>
    <div class="verification-code" data-verification-code id="{{ field_id }}">
        <div class="verification-code__boxes" role="group" aria-labelledby="{{ field_id }}_label">
            {% for i in range(6) %}
            <input
                class="verification-code__digit input"
                type="text"
                inputmode="numeric"
                pattern="[0-9]"
                maxlength="1"
                autocomplete="{{ 'one-time-code' if loop.first else 'off' }}"
                aria-label="Цифра {{ loop.index }} из 6"
                id="{{ field_id }}_{{ i }}"
                data-index="{{ i }}"
                {% if loop.first %}autofocus{% endif %}
            >
            {% endfor %}
        </div>
        <input type="hidden" name="{{ field_name }}" id="{{ field_id }}_value" data-verification-value value="">
    </div>
    {% if hint %}
    <p class="form-field__hint">{{ hint }}</p>
    {% endif %}
</div>
{% endmacro %}

{% macro verification_code_scripts() %}
<script src="/static/js/verification-code.js?v=1" defer></script>
{% endmacro %}
