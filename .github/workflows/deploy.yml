name: Deploy to VPS

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Запускаем только при слиянии PR из develop в main
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.merged == true &&
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.ref == 'develop'
      )
    
    steps:
    - uses: actions/checkout@v4

    - name: Check required secrets
      run: |
        MISSING=""
        [ -z "${{ secrets.VPS_HOST }}" ] && MISSING="${MISSING}VPS_HOST "
        [ -z "${{ secrets.VPS_USER }}" ] && MISSING="${MISSING}VPS_USER "
        [ -z "${{ secrets.VPS_SSH_KEY }}" ] && MISSING="${MISSING}VPS_SSH_KEY "
        [ -z "${{ secrets.APP_DIR }}" ] && MISSING="${MISSING}APP_DIR "
        if [ -n "$MISSING" ]; then
          echo "::error::Missing GitHub Actions secrets: $MISSING"
          echo "Add them in: Repository → Settings → Secrets and variables → Actions"
          echo "Required: VPS_HOST, VPS_USER, VPS_SSH_KEY, APP_DIR (and DB_*, SECRET_KEY, ALLOWED_HOSTS for deploy)"
          exit 1
        fi
        echo "Required deploy secrets are set."

    - name: Debug PR information
      run: |
        echo "PR Base Ref: ${{ github.event.pull_request.base.ref }}"
        echo "PR Head Ref: ${{ github.event.pull_request.head.ref }}"
        echo "PR Merged: ${{ github.event.pull_request.merged }}"
        echo "PR State: ${{ github.event.pull_request.state }}"

    - name: Ensure app directory exists
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          APP_DIR="${{ secrets.APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            echo "❌ Secret APP_DIR is required (example: /home/<user>/appointment-system)"
            exit 1
          fi
          mkdir -p "$APP_DIR"
          echo "APP_DIR=$APP_DIR"

    - name: Upload project files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "."
        target: ${{ secrets.APP_DIR }}
    
    - name: Deploy (Python 3.10 + MySQL, no Docker)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          APP_DIR="${{ secrets.APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            echo "❌ Secret APP_DIR is required (example: /home/<user>/appointment-system)"
            exit 1
          fi
          export APP_DIR
          echo "📁 Using APP_DIR=$APP_DIR"
          cd "$APP_DIR"

          # .env создаётся из GitHub Secrets — обновлять на сервере вручную не нужно
          cat > .env << EOF
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          SITE_URL=${{ secrets.SITE_URL }}
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          ADMIN_TELEGRAM_USERNAME=${{ secrets.ADMIN_TELEGRAM_USERNAME }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL }}
          EOF

          # Ensure predictable PATH in non-interactive SSH
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          # Python deps (prefer python3.10 on hosting)
          # You can override via Secrets:
          #   PYTHON_BIN=/full/path/to/python3.10
          PYTHON_BIN="${{ secrets.PYTHON_BIN }}"

          if [ -z "$PYTHON_BIN" ]; then
            # reg.ru often provides Python in /opt/python/*
            if [ -x "/opt/python/python-3.10.1/bin/python" ]; then
              PYTHON_BIN="/opt/python/python-3.10.1/bin/python"
            elif command -v python3.10 >/dev/null 2>&1; then
              PYTHON_BIN="python3.10"
            elif command -v python3 >/dev/null 2>&1; then
              PYTHON_BIN="python3"
            else
              echo "❌ Python not found on server"
              exit 1
            fi
          fi

          echo "🐍 Using PYTHON_BIN=$PYTHON_BIN"
          command -v "$PYTHON_BIN" || true
          "$PYTHON_BIN" --version

          # Recreate venv to ensure correct Python version
          rm -rf venv
          "$PYTHON_BIN" -m venv venv
          . venv/bin/activate
          # На некоторых хостингах venv создаётся с неполным pip (No module named 'pip._vendor.packaging.markers') — переустанавливаем
          python -m ensurepip --upgrade 2>/dev/null || true
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import pymysql; print('PyMySQL OK')" || { echo "❌ PyMySQL not in venv"; exit 1; }

          chmod +x scripts/migrate.sh scripts/run_bot.sh scripts/run_reminders.sh
          ./scripts/migrate.sh

          mkdir -p tmp logs media
          touch tmp/restart.txt
          touch .restart-app

          PIDFILE="$APP_DIR/uvicorn.pid"
          LOGFILE="$APP_DIR/uvicorn.log"

          if [ -f "$PIDFILE" ]; then
            echo "🛑 Stopping old uvicorn"
            kill -TERM "$(cat "$PIDFILE")" || true
            rm -f "$PIDFILE"
            sleep 2
          fi

          echo "🚀 Starting uvicorn (FastAPI)"
          nohup "$APP_DIR/venv/bin/uvicorn" app.main:app \
            --host 127.0.0.1 --port 8000 --workers 2 \
            > "$LOGFILE" 2>&1 &
          UVICORN_PID=$!
          echo $UVICORN_PID > "$PIDFILE"
          sleep 2
          if kill -0 $UVICORN_PID 2>/dev/null; then
            echo "✅ Uvicorn started, PID $UVICORN_PID"
          else
            echo "❌ Uvicorn failed to start. Last 30 lines of log:"
            tail -30 "$LOGFILE" 2>/dev/null || true
            exit 1
          fi

          BOT_PIDFILE="$APP_DIR/bot.pid"
          BOT_LOG="$APP_DIR/bot.log"
          if [ -f "$BOT_PIDFILE" ]; then
            OLD_PID=$(cat "$BOT_PIDFILE")
            kill -TERM "$OLD_PID" 2>/dev/null || true
            rm -f "$BOT_PIDFILE"
            sleep 2
          fi
          : > "$BOT_LOG"
          cd "$APP_DIR" && nohup env APP_DIR="$APP_DIR" "$APP_DIR/scripts/run_bot.sh" >> "$BOT_LOG" 2>&1 &
          BOT_PID=$!
          echo $BOT_PID > "$BOT_PIDFILE"
          sleep 2
          if kill -0 $BOT_PID 2>/dev/null; then
            echo "✅ Telegram bot restarted, PID $BOT_PID"
          else
            echo "⚠️ Bot may have exited. Check $BOT_LOG"
          fi

          echo "✅ Deploy completed. Uvicorn: $LOGFILE, Bot: $BOT_LOG"
