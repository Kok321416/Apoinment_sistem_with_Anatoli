name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check required secrets
      run: |
        MISSING=""
        [ -z "${{ secrets.VPS_HOST }}" ] && MISSING="${MISSING}VPS_HOST "
        [ -z "${{ secrets.VPS_USER }}" ] && MISSING="${MISSING}VPS_USER "
        [ -z "${{ secrets.VPS_SSH_KEY }}" ] && MISSING="${MISSING}VPS_SSH_KEY "
        [ -z "${{ secrets.APP_DIR }}" ] && MISSING="${MISSING}APP_DIR "
        if [ -n "$MISSING" ]; then
          echo "::error::Missing GitHub Actions secrets: $MISSING"
          echo "Add them in: Repository → Settings → Secrets and variables → Actions"
          echo "Required: VPS_HOST, VPS_USER, VPS_SSH_KEY, APP_DIR (and DB_*, SECRET_KEY, ALLOWED_HOSTS for deploy)"
          exit 1
        fi
        echo "Required deploy secrets are set."

    - name: Ensure app directory exists
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          APP_DIR="${{ secrets.APP_DIR }}"
          if [ -z "$APP_DIR" ]; then
            echo "❌ Secret APP_DIR is required (example: /home/<user>/appointment-system)"
            exit 1
          fi
          mkdir -p "$APP_DIR"
          echo "APP_DIR=$APP_DIR"

    - name: Upload project files to server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        source: "."
        target: ${{ secrets.APP_DIR }}
    
    - name: Deploy (Python 3.10 + MySQL, no Docker)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          APP_DIR="${{ secrets.APP_DIR }}"
          FULL_RESET_ONCE="${{ secrets.FULL_RESET_ONCE }}"
          RESET_MARKER_FILE="$APP_DIR/.deploy_reset_done"
          if [ -z "$APP_DIR" ]; then
            echo "❌ Secret APP_DIR is required (example: /home/<user>/appointment-system)"
            exit 1
          fi
          export APP_DIR
          echo "📁 Using APP_DIR=$APP_DIR"
          echo "📌 Deploy commit: ${{ github.sha }}"
          cd "$APP_DIR"
          chmod +x scripts/migrate.sh scripts/run_bot.sh scripts/run_reminders.sh scripts/stop_bot.sh 2>/dev/null || true

          echo "🛑 Stop bot before recreating venv (old PIDs may hold deleted venv files)"
          ./scripts/stop_bot.sh || true
          sleep 2

          # .env создаётся из GitHub Secrets — обновлять на сервере вручную не нужно
          cat > .env << EOF
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST || 'localhost' }}
          DB_PORT=${{ secrets.DB_PORT }}
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          DEBUG=False
          ALLOWED_HOSTS=${{ secrets.ALLOWED_HOSTS }}
          SITE_URL=${{ secrets.SITE_URL }}
          SITE_INTERNAL_URL=${{ secrets.SITE_INTERNAL_URL }}
          GOOGLE_OAUTH_CLIENT_ID=${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET=${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_BOT_USERNAME=${{ secrets.TELEGRAM_BOT_USERNAME }}
          BOT_API_SECRET=${{ secrets.BOT_API_SECRET }}
          ADMIN_TELEGRAM_USERNAME=${{ secrets.ADMIN_TELEGRAM_USERNAME }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT || '465' }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          SMTP_FROM_NAME=${{ secrets.SMTP_FROM_NAME || 'Все клиенты здесь' }}
          SITE_BRAND_NAME=${{ secrets.SITE_BRAND_NAME || 'Все клиенты здесь' }}
          SMTP_USE_SSL=${{ secrets.SMTP_USE_SSL || 'true' }}
          EOF

          # Ensure predictable PATH in non-interactive SSH
          export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          # Python deps (prefer python3.10 on hosting)
          # You can override via Secrets:
          #   PYTHON_BIN=/full/path/to/python3.10
          PYTHON_BIN="${{ secrets.PYTHON_BIN }}"

          if [ -z "$PYTHON_BIN" ]; then
            # reg.ru often provides Python in /opt/python/*
            if [ -x "/opt/python/python-3.10.1/bin/python" ]; then
              PYTHON_BIN="/opt/python/python-3.10.1/bin/python"
            elif command -v python3.10 >/dev/null 2>&1; then
              PYTHON_BIN="python3.10"
            elif command -v python3 >/dev/null 2>&1; then
              PYTHON_BIN="python3"
            else
              echo "❌ Python not found on server"
              exit 1
            fi
          fi

          echo "🐍 Using PYTHON_BIN=$PYTHON_BIN"
          command -v "$PYTHON_BIN" || true
          "$PYTHON_BIN" --version

          # Recreate venv to ensure correct Python version
          rm -rf venv
          "$PYTHON_BIN" -m venv venv
          . venv/bin/activate
          # На некоторых хостингах venv создаётся с неполным pip (No module named 'pip._vendor.packaging.markers') — переустанавливаем
          python -m ensurepip --upgrade 2>/dev/null || true
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -c "import pymysql; print('PyMySQL OK')" || { echo "❌ PyMySQL not in venv"; exit 1; }

          # Optional one-time full reset:
          # - clean legacy app artifacts
          # - drop all tables in current DB
          # Trigger by setting secret FULL_RESET_ONCE=true
          # Reset runs only once because marker file is written after success.
          if [ "$FULL_RESET_ONCE" = "true" ] && [ ! -f "$RESET_MARKER_FILE" ]; then
            echo "🧹 FULL_RESET_ONCE enabled, running one-time project reset"
            rm -rf appoinment_sistem appoiment_system bookings telegram_bot templates/bookings || true
            python - <<'PY'
          import os
          from sqlalchemy import MetaData, create_engine

          db_name = os.getenv("DB_NAME", "").strip()
          db_user = os.getenv("DB_USER", "appointment_user")
          db_password = os.getenv("DB_PASSWORD", "")
          db_host = os.getenv("DB_HOST", "localhost")
          db_port = os.getenv("DB_PORT", "3306")

          if not db_name:
              print("DB_NAME empty, skip full DB reset")
          else:
              url = f"mysql+pymysql://{db_user}:{db_password}@{db_host}:{db_port}/{db_name}?charset=utf8mb4"
              engine = create_engine(url, pool_pre_ping=True)
              meta = MetaData()
              meta.reflect(bind=engine)
              if meta.tables:
                  print(f"Dropping {len(meta.tables)} tables from {db_name}")
                  meta.drop_all(bind=engine)
              else:
                  print("No tables found, nothing to drop")
          PY
            touch "$RESET_MARKER_FILE"
            echo "✅ One-time reset completed. Next deploys will be normal updates."
          else
            echo "ℹ️ Full reset skipped (normal deploy mode)"
          fi

          chmod +x scripts/migrate.sh scripts/run_bot.sh scripts/run_reminders.sh
          ./scripts/migrate.sh

          mkdir -p tmp logs media

          echo "🧪 Checking Passenger WSGI entrypoint"
          python -c "import passenger_wsgi; print('passenger_wsgi OK')"

          echo "🛑 Stopping orphan manual web processes (if any)"
          if [ -f "$APP_DIR/uvicorn.pid" ]; then
            kill -TERM "$(cat "$APP_DIR/uvicorn.pid")" 2>/dev/null || true
            rm -f "$APP_DIR/uvicorn.pid"
          fi
          if [ -f "$APP_DIR/gunicorn.pid" ]; then
            kill -TERM "$(cat "$APP_DIR/gunicorn.pid")" 2>/dev/null || true
            rm -f "$APP_DIR/gunicorn.pid"
          fi
          pkill -f "uvicorn app.main:app" 2>/dev/null || true
          pkill -f "gunicorn.*appoinment_sistem" 2>/dev/null || true

          echo "🔄 Restarting web app via Passenger (reg.ru)"
          touch tmp/restart.txt
          touch .restart-app

          echo "⏳ Waiting for Passenger to reload..."
          sleep 8
          HTTP_CODE="000"
          for attempt in 1 2 3 4 5 6; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://127.0.0.1:8000/ 2>/dev/null || echo "000")
            case "$HTTP_CODE" in
              000) sleep 3 ;;
              *) break ;;
            esac
          done
          echo "HTTP check http://127.0.0.1:8000/ => $HTTP_CODE"
          case "$HTTP_CODE" in
            5*)
              echo "❌ Web app returned HTTP $HTTP_CODE after Passenger restart"
              exit 1
              ;;
            000)
              echo "⚠️ localhost:8000 not reachable from SSH (Passenger may proxy only via domain)"
              ;;
            *)
              echo "✅ Web app responds (HTTP $HTTP_CODE)"
              ;;
          esac

          BOT_PIDFILE="$APP_DIR/bot.pid"
          BOT_LOG="$APP_DIR/bot.log"
          chmod +x scripts/stop_bot.sh scripts/run_bot.sh
          ./scripts/stop_bot.sh || true
          sleep 2
          if ! "$APP_DIR/venv/bin/python" -c "import requests" 2>/dev/null; then
            echo "❌ requests missing in venv after pip install"
            exit 1
          fi
          : > "$BOT_LOG"
          cd "$APP_DIR" && nohup env APP_DIR="$APP_DIR" bash "$APP_DIR/scripts/run_bot.sh" >> "$BOT_LOG" 2>&1 &
          BOT_PID=$!
          sleep 3
          if [ -f "$BOT_PIDFILE" ] && kill -0 "$(cat "$BOT_PIDFILE")" 2>/dev/null; then
            BOT_PID="$(cat "$BOT_PIDFILE")"
            echo "✅ Telegram bot restarted, PID $BOT_PID"
          elif kill -0 $BOT_PID 2>/dev/null; then
            echo $BOT_PID > "$BOT_PIDFILE"
            echo "✅ Telegram bot restarted, PID $BOT_PID"
          else
            echo "⚠️ Bot may have exited. Check $BOT_LOG"
            tail -20 "$BOT_LOG" 2>/dev/null || true
          fi
          RUNNING=$(pgrep -fc '[m]bot.run' 2>/dev/null || echo 0)
          if [ "$RUNNING" -gt 1 ] 2>/dev/null; then
            echo "❌ Multiple bot processes detected ($RUNNING). Run ./scripts/stop_bot.sh on server."
            exit 1
          fi

          echo "✅ Deploy completed. Web: Passenger (passenger_wsgi.py), Bot: $BOT_LOG"
